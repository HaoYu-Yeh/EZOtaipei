<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EZOtaipei</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 確保圖片依據比例縮放，不會變形 */
        }
        /* 頁碼顯示 */
        .page-number {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-family: sans-serif;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper" id="menu-container">
            </div>
        <div class="page-number"><span id="current">1</span> / 17</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const container = document.getElementById('menu-container');
        const totalPages = 17;

        // 自動產生 18 頁菜單
        for (let i = 1; i <= totalPages; i++) {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            slide.innerHTML = `<img src="${i}.png ?v=2" alt="Menu Page ${i}">`;
            container.appendChild(slide);
        }

        // 初始化 Swiper
        const swiper = new Swiper('.swiper', {
            loop: false, // 是否循環（滑到最後一頁回到第一頁）
            on: {
                slideChange: function () {
                    document.getElementById('current').innerText = this.activeIndex + 1;
                },
            },
        });
    </script>
</body>
</html>
